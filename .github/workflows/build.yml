name: Build and Deploy RocketMQ Dashboard

on:
  push:
    branches:
      - main # 或者你想要触发的分支
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout RocketMQ Dashboard repository
      uses: actions/checkout@v2
      
    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        java-version: '11'

    - name: Build RocketMQ Dashboard JAR
      run: |
        ./mvnw clean package -DskipTests

    - name: Upload JAR file as artifact
      uses: actions/upload-artifact@v2
      with:
        name: rocketmq-dashboard-jar
        path: target/rocketmq-dashboard-*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout rocketmq-dashboard-jar repository
      uses: actions/checkout@v2
      with:
        repository: YOUR_USER/rocketmq-dashboard-jar
        token: ${{ secrets.GITHUB_TOKEN }}
        path: rocketmq-dashboard-jar

    - name: Copy JAR file to deploy repo
      run: |
        cp target/rocketmq-dashboard-*.jar ../rocketmq-dashboard-jar/
    
    - name: Commit and push JAR to rocketmq-dashboard-jar repo
      run: |
        cd ../rocketmq-dashboard-jar
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "Update rocketmq-dashboard JAR"
        git push origin main
