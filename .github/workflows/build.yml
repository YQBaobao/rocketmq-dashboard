name: 构建和部署 RocketMQ 仪表板

on:
  push:
    branches:
      - master # 或者你想要触发的分支
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 查看 RocketMQ 仪表板存储库
      uses: actions/checkout@v4
      
    - name: 设置 JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: 构建 RocketMQ 仪表板 JAR
      run: |
        ./mvn clean package -Dmaven.test.skip=true

    - name: 上传 JAR 文件作为工件
      uses: actions/upload-artifact@v4
      with:
        name: RocketMQ 仪表板 jar
        path: target/rocketmq-dashboard-*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: 查看 Rocketmq-dashboard 存储库
      uses: actions/checkout@v4
      with:
        repository: YQBaobao/rocketmq-dashboard
        token: ${{ secrets.ACTIONS_TOKEN }}
        path: rocketmq-dashboard

    - name: 复制 JAR 文件以部署存储库
      run: |
        cp target/rocketmq-dashboard-*.jar ../rocketmq-dashboard/
    
    - name: 提交 JAR 并将其推送到 RocketMQ-dashboard-jar 存储库
      run: |
        cd ../rocketmq-dashboard
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "Update rocketmq-dashboard JAR"
        git push origin master
