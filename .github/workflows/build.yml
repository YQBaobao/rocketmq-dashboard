name: 构建和部署 RocketMQ 仪表板

on:
  push:
    branches:
      - master # 或者你想要触发的分支
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 查看 RocketMQ 仪表板存储库
      uses: actions/checkout@v4
  
    - name: 设置 JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        architecture: x64

    - name: 构建 RocketMQ 仪表板 JAR
      run: mvn clean package -Dmaven.test.skip=true

    - name: 列出目标目录中的文件
      run: ls -l ./target/

    # - name: 查看 Rocketmq-dashboard 存储库
    #   uses: actions/checkout@v4
    #   with:
    #     repository: YQBaobao/rocketmq-dashboard
    #     token: ${{ secrets.ACTIONS_TOKEN }}
    #     path: rocketmq-dashboard

    # - name: 创建 target 目录
    #   run: mkdir ./rocketmq-dashboard/target
    
    # - name: 复制 JAR 文件以部署存储库
    #   run: cp ./target/rocketmq-dashboard-*.jar ./rocketmq-dashboard/target
    
    # - name: 提交 JAR 并将其推送到 RocketMQ-dashboard-jar 存储库
    #   run: |
    #     cd rocketmq-dashboard
    #     git config --global user.name "GitHub Actions"
    #     git config --global user.email "actions@github.com"
    #     git add .
    #     git commit -m "Update rocketmq-dashboard JAR"
    #     git push origin master

  create_release:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: 签出存储库
      uses: actions/checkout@v4
      with:
        repository: YQBaobao/rocketmq-dashboard
        token: ${{ secrets.ACTIONS_TOKEN }} 

    - name: 创建发布
      id: create_release
      run: |
        # 获取最新的 Git tag
        VERSION="v$(date +'%Y.%m.%d.%H%M%S')"  # 使用当前时间戳作为版本号，或手动设置
        RESPONSE=$(curl -X POST \
          -H "Authorization: token ${{ secrets.ACTIONS_TOKEN }}" \
          -d '{"tag_name": "'$VERSION'", "name": "'$VERSION'", "body": "Release version '$VERSION'", "draft": false, "prerelease": false}' \
          "https://api.github.com/repos/YOUR_USER/rocketmq-dashboard/releases")
        
        echo "Release created: $RESPONSE"

    - name: 上传JAR到GitHub发布
      run: |
        VERSION="v$(date +'%Y.%m.%d.%H%M%S')"  # 使用当前时间戳作为版本号，或手动设置
        # 上传 JAR 文件到创建的 Release
        upload_url=$(echo $RESPONSE | jq -r .upload_url | sed -e "s/{?name,label}//")
        curl -X POST --data-binary @target/rocketmq-dashboard-2.0.1-SNAPSHOT.jar \
          -H "Authorization: token ${{ secrets.ACTIONS_TOKEN }}" \
          -H "Content-Type: application/octet-stream" \
          "$upload_url?name=rocketmq-dashboard-2.0.1-SNAPSHOT.jar"
